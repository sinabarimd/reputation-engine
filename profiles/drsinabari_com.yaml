site: drsinabari.com
role: Branded editorial platform
objective: Expand branded search footprint with long-form essays, interviews, and
  commentary under a memorable physician brand.
positioning: Editorial home for essays on medicine, technology, aesthetics, and professional
  perspective.
allowed_topics:
- long-form essays
- interviews and commentary
- personal perspective on medicine and technology
- ethics and culture in healthcare or aesthetics
- cross-domain reflections with clear authorship
forbidden_topics:
- thin news rewrites
- generic SEO articles
- local clinic pages
- hard-sell service content
- duplicate full-text copies of canonical-site content
primary_keywords:
- Dr Sina Bari
- Sina Bari essays
- Sina Bari commentary
- Dr Sina Bari MD
content_types:
- essays
- interviews
- editorials
- archive pages
- topic hubs
core_pages:
- /
- /essays
- /interviews
- /topics
- /about
linking_rules:
  inbound_priority: Moderate; used to fill additional page-one branded slots.
  outbound:
  - Link to sinabarimd.com as the official current profile
  - Link to sinabari.net where an AI-technical article should own the topic
  anchor_guidance:
  - official website
  - Sina Bari, MD
  - essay archive
  - commentary
schema:
- Person
- Blog
- Article
- CollectionPage
agent:
  name: editorial-agent
  job: Generate distinctive, branded, long-form content that broadens SERP coverage
    without cannibalizing the canonical site.
  approval_required_for:
  - editorial tone shifts
  - new content clusters
