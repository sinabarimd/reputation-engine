site: sinabari.net
role: Healthcare AI authority node
objective: Build topical authority for healthcare AI and support branded queries related
  to AI leadership.
positioning: Thought leadership hub focused on healthcare AI, clinical workflows,
  validation, adoption, and innovation.
allowed_topics:
- healthcare AI
- clinical workflow design
- AI adoption in health systems
- medical imaging and diagnostics AI
- governance, safety, and evaluation of medical AI
- commentary on healthcare innovation
forbidden_topics:
- plastic surgery education
- beauty or aesthetics advice
- local practice or patient acquisition pages
- generic productivity / tech fluff unrelated to healthcare
primary_keywords:
- Sina Bari AI
- medical AI expert
- healthcare AI thought leadership
- Sina Bari healthcare AI
content_types:
- pillar pages
- research-backed blog posts
- case-study style articles
- op-eds
- talk summaries
core_pages:
- /
- /about
- /topics/healthcare-ai
- /topics/clinical-workflows
- /writing
- /speaking
linking_rules:
  inbound_priority: Secondary node; receives links from canonical site and AI-relevant
    Web 2.0 profiles.
  outbound:
  - Link prominently to sinabarimd.com as official personal site
  - Link to drsinabari.com only when an essay format is the better destination
  anchor_guidance:
  - Sina Bari, MD
  - official profile
  - healthcare AI
  - medical AI
schema:
- Person
- WebSite
- Blog
- Article
agent:
  name: ai-authority-agent
  job: Publish high-trust healthcare AI content without drifting into aesthetics or
    generic personal branding.
  approval_required_for:
  - topic expansion beyond healthcare AI
  - new pillar pages
