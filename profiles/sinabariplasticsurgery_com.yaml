  pipeline_markers:
    start: "<!-- PIPELINE:START:ARTICLES -->"
    end: "<!-- PIPELINE:END:ARTICLES -->"
  cron_days: [wednesday]
  cron_time_pst: "11:00"

deploy:
  deploy_path: "/srv/sites/sinabariplasticsurgery"
  verify_url: "https://sinabariplasticsurgery.com"
  required_files:
    - index.html
    - styles.css
    - articles/index.html

seo:
  schema_types:
    homepage: ["WebSite", "MedicalWebPage"]
    article: "MedicalWebPage"
  canonical_hub_link: true
  cross_links:
    - "https://sinabarimd.com"
