# Site Profile: sinabarimd.com
# Role: Canonical identity hub — the primary entity anchor for Dr. Sina Bari
# All satellite sites reference this domain for author attribution.

site_id: sinabarimd
domain: sinabarimd.com
name: "Dr. Sina Bari, MD — Plastic Surgeon & Clinical Executive"
role: "Canonical identity hub"

author:
  name: "Dr. Sina Bari, MD"
  url: "https://sinabarimd.com/about"
  author_id: "https://sinabarimd.com/#sinabari"

content:
  allowed_topics:
    - biography
    - professional work
    - media appearances
    - selected writing
    - entity consolidation
  forbidden_topics:
    - thin blog spam
    - clinic impersonation
    - generic AI content
  default_word_count: 750
  tone: "professional, personal, authoritative"

publishing:
  min_days_between_publishes: 7
  pipeline_section: "PUBLICATIONS"
  pipeline_markers:
    start: "<!-- PIPELINE:START:PUBLICATIONS -->"
    end: "<!-- PIPELINE:END:PUBLICATIONS -->"
  cron_days: [monday]
  cron_time_pst: "09:00"

deploy:
  deploy_path: "/srv/sites/sinabarimd"
  verify_url: "https://sinabarimd.com"
  required_files:
    - index.html
    - styles.css
    - dashboard.html
    - about.html
    - articles/index.html
    - press.html
    - sitemap.xml
    - robots.txt

seo:
  schema_types:
    homepage: ["Person", "Physician", "ProfilePage"]
    article: "Article"
  structured_data:
    same_as:
      - "https://linkedin.com/in/sinabari"
      - "https://sinabari.net"
      - "https://drsinabari.com"
      - "https://sinabariplasticsurgery.com"
    alumni_of: "Stanford University"
    has_credential: "MD"
    medical_specialty: "PlasticSurgery"
    work_location: "Los Angeles, CA"
  canonical_hub: true
  cross_links:
    - "https://sinabari.net"
    - "https://drsinabari.com"
    - "https://sinabariplasticsurgery.com"
