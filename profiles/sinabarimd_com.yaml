site: sinabarimd.com
role: Canonical identity hub
objective: Own branded name queries and act as the central entity page all other assets
  reinforce.
positioning: Sina Bari, MD — surgeon, medical AI leader, and writer on healthcare
  technology and aesthetics.
allowed_topics:
- biography and credentials
- current work in medical AI
- selected media and speaking
- curated essays that connect surgery, aesthetics, and healthcare technology
- brand-safe updates about projects and publications
forbidden_topics:
- thin generic SEO blog posts
- local-clinic style service pages unless factually current
- placeholder office/contact claims
- broad unsourced medical claims
- duplicate reposts of full articles from satellite sites
primary_keywords:
- Sina Bari MD
- Dr Sina Bari
- Sina Bari
- Sina Bari AI
- Sina Bari surgeon
content_types:
- homepage
- about / current work
- media and speaking
- selected essays
- press / interviews
- contact
core_pages:
- /
- /about
- /current-work
- /writing
- /media
- /contact
linking_rules:
  inbound_priority: Receive strongest contextual links from all owned sites and Web
    2.0 profiles.
  outbound:
  - Link to sinabari.net from AI / healthcare technology sections
  - Link to drsinabari.com from essays / commentary sections
  - Link to sinabariplasticsurgery.com only from historical expertise or aesthetics
    archive contexts
  anchor_guidance:
  - Sina Bari, MD
  - official site
  - current work
  - medical AI
schema:
- Person
- WebSite
- Organization (if needed for company/project pages)
- Article
agent:
  name: identity-agent
  job: Maintain entity clarity, homepage authority, and branded SERP control.
  approval_required_for:
  - homepage rewrites
  - bio changes
  - contact or credential edits
